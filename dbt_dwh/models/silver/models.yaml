models:
  - name: crm_cst_info
    description: Очищенная и подготовленная таблица с покупателями
    docs:
      show: true
      node_color: silver
    
    columns:
      - name: cst_id
        data_type: integer
        description: id покупателя
        tests:
          - not_null
          - unique
      
      - name: cst_key
        data_type: varchar(50)
        description: Бизнес-ключ покупателя
      
      - name: cst_firstname
        data_type: varchar(50)
        description: Имя покупателя
        tests:
          - no_whitespace
      
      - name: cst_lastname
        description: Фамилия покупателя
        data_type: varchar(50)
        tests:
          - no_whitespace
      
      - name: cst_marital_status
        description: Семейное положение
        data_type: varchar(10)
        tests:
          - no_whitespace
      
      - name: cst_gndr
        description: Пол покупателя
        data_type: varchar(10)
        tests:
          - no_whitespace
      
      - name: cst_create_date
        description: Дата создания записи
        data_type: date
      
      - name: dwh_load_dttm
        description: Дата и время загрузки в БД
        data_type: timestamp

  - name: crm_prd_info
    description: Очищенная и подготовленная историчная по SCD2 таблица с товарами
    docs:
      show: true
      node_color: silver
    
    columns:
      - name: prd_id
        description: id товара
        data_type: int
        tests:
          - unique
          - not_null
      
      - name: cat_id
        description: id категории товара
        data_type: char(5)
      
      - name: prd_key
        description: Бизнес-ключ товара
        data_type: varchar(10)
      
      - name: prd_nm
        description: Название товара
        data_type: varchar(50)
      
      - name: prd_cost
        description: закупочная цена товара (себестоимость)
        data_type: varchar(10)
      
      - name: prd_line
        description: Типы товаров
        data_type: varchar(10)
        tests:
          - no_whitespace
      
      - name: prd_start_dt
        description: С какой даты актуальна запись (SCD2)
      
      - name: prd_end_dt
        description: По какую дату актуальна запись (SCD2)
      
      - name: dwh_load_dttm
        description: Дата и время загрузки в бд

  - name: crm_sales_details
    description: Очищенная и подготовленная таблица с продажами
    docs:
      show: true
      node_color: silver
    
    columns:
      - name: sls_ord_num
        description: Номер заказа
        data_type: varchar(50)
        tests:
          - not_null
      
      - name: sls_prd_key
        description: Бизнес-ключ товара
        data_type: char(50)
      
      - name: sls_cust_id
        description: id покупателя
        data_type: int
      
      - name: sls_order_dt
        description: Дата создания заказа
        data_type: date
        constraints:
          - type: check
            expression: 'sls_order_dt < sls_ship_dt'
      
      - name: sls_ship_dt
        description: Дата отправки заказа
        data_type: date
        constraints:
          - type: check
            expression: 'sls_ship_dt < sls_due_dt'
      
      - name: sls_due_dt
        description: Планируемая дата доставки
        data_type: date
      
      - name: sls_sales
        description: Стоимость заказа
        constraints:
          - type: check
            expression: 'sls_sales > 0'
      
      - name: sls_quantity
        description: Количество товара
      
      - name: sls_price
        description: Цена товара
      
      - name: dwh_load_dttm
        description: Дата и время загрузки в бд

  - name: erp_cust_az12
    description: Таблица с очищенными доп данными о клиентах
    docs:
      show: true
      node_color: silver
    
    columns:
      - name: cst_key
        description: Бизнес-ключ клиента
      
      - name: bdate
        description: Дата рождения клиента
        constraints:
        - type: check
          expression: 'bdate < current_timestamp'
      
      - name: gen
        description: Пол клиента

      - name: dwh_load_dttm
        description: Дата и время загрузки в бд

  - name: erp_loc_a101
    description: Очищенные и стандартизированные дополнительные данные о клиентах (страна проживания)
    docs:
      show: true
      node_color: silver
    
    columns:
      - name: cid
        description: Бизнес ключ клиента
      
      - name: cntry
        description: Страна проживания клиента

      - name: dwh_load_dttm
        description: Дата и время загрузки в бд